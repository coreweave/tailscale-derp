# Default values for tailscale-derp.

derpServerHostname: 'derp.foo.bar'

replicaCount: 1

image:
  repository: ghcr.io/coreweave/tailscale-derp
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

deploymentAnnotations: {}

env:
  - name: GOMAXPROCS
    valueFrom:
      resourceFieldRef:
        resource: limits.cpu
  - name: GOMEMLIMIT
    valueFrom:
      resourceFieldRef:
        resource: limits.memory
  - name: DERP_HOSTNAME
    value: '{{ include "tailscale-derp.hostname" . }}'
  # // Pass extra arguments to derper
  # - name: DERP_CERTMODE
  #   value: "manual"
  # - name: DERP_CERTDIR
  #   value: "/app/certs"
  # - name: DERP_HTTP_PORT
  #   value: "80"
  # - name: DERP_STUN_PORT
  #   value: "80"
  # - name: DERP_STUN
  #   value: "true"
  # If using verify-clients, configure the tailscaled container below
  # - name: DERP_VERIFY_CLIENTS
  #   value: "false"

# // Configure tailscaled container when using verify-clients
tailscaled: {}
  # volumeMounts:
  #   - name: pipes
  #     mountPath: /tmp
  # env:
  # - name: TS_HEALTHCHECK_ADDR_PORT
  #   value: 0.0.0.0:9002 # Enable liveness
  # - name: TS_USERSPACE
  #   value: "true" # unprivileged
  # - name: TS_KUBE_SECRET
  #   value: "" # ephemeral
  # - name: TS_AUTH_KEY
  #   value: "" # register with auth key
  # livenessProbe:
  #   httpGet:
  #     path: /healthz
  #     port: 9002
  # readinessProbe:
  #   httpGet:
  #     path: /healthz
  #     port: 9002

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      # derper binds the privileged 80/443/3478 ports as a non-root user.
      - NET_BIND_SERVICE

service:
  type: ClusterIP
  enabled: false
  internalTrafficPolicy: Cluster
  externalTrafficPolicy: Local
  annotations:
      externaldns.alpha.kubernetes.io/hostname: '{{ include "tailscale-derp.hostname" . }}'
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: https
      port: 443
      targetPort: 443
    - name: stun
      port: 3478
      targetPort: 3478
  directAttach:
    enabled: false
    annotations: {}
    labels: {}

resources:
  requests:
    cpu: 100m
    memory: 2Gi
  limits:
    cpu: 2000m
    memory: 2Gi

# startupProbe gates the slow first start for cert acquisition so the
# liveness/readiness probes don't need a large fixed initialDelaySeconds.
startupProbe:
  exec:
    command:
      - /bin/bash
      - -c
      - /app/healthprobe.sh
  periodSeconds: 10
  failureThreshold: 60
  timeoutSeconds: 60

livenessProbe:
  exec:
    command:
      - /bin/bash
      - -c
      - /app/healthprobe.sh
  timeoutSeconds: 60

readinessProbe:
  exec:
    command:
      - /bin/bash
      - -c
      - /app/healthprobe.sh
  timeoutSeconds: 60

tls: {}
  # enabled: true
  # domain: '{{ include "tailscale-derp.hostname" . }}'

# Additional volumes on the output Deployment definition.
volumes:
  - name: pipes
    emptyDir: {}
# - name: cert
#   secret:
#     secretName: '{{ .Release.Name }}-tls'

# Additional volumeMounts on the output Deployment definition.
volumeMounts:
  - name: pipes
    mountPath: /var/run/tailscale
# - name: cert
#   mountPath: '/app/certs/{{ include "tailscale-derp.hostname" . }}.crt'
#   subPath: tls.crt
# - name: cert
#   mountPath: '/app/certs/{{ include "tailscale-derp.hostname" . }}.key'
#   subPath: tls.key
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
